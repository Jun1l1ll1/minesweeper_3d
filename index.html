<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2c3e50" />
    <title>Minesweeper 3D</title>
    <!-- Manifest defines how the app appears when installed on a device -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css?v=0.7" />
</head>
<body>
    <dialog id="settings-dialog">

        <div class="settings-container">
            <fieldset>
                <legend>Pre-sets</legend>
                <div class="settings-item">
                    <label for="preset-select">Pre-set:</label>
                    <select onchange="usePreset(this.value)" name="preset-select" id="preset-select">
                        <option value="1D">1D</option>
                        <option value="Easy">Easy</option>
                        <option value="Medium">Medium</option>
                        <option value="Hard">Hard</option>
                        <option value="Insane">Insane</option>
                    </select>
                </div>
            </fieldset>

            <fieldset>
                <legend>Difficulty</legend>
                <button class="settings-reset-btn" onclick="resetSetting('difficulty')"><i>Reset</i></button>
                <div class="settings-item">
                    <label for="bomb-amount-inp">Bomb amount:</label>
                    <input type="number" name="bomb-amount-inp" id="bomb-amount-inp" value="5" onchange="updateSetting(this.value, 'difficulty', 'bombAmount')" />
                </div>
                <div class="settings-item">
                    <label for="lives-inp">Lives:</label>
                    <input type="number" name="lives-inp" id="lives-inp" value="3" onchange="updateSetting(this.value, 'difficulty', 'lives')" />
                </div>
                <span class="tip-note">(Difficulty update at the start of a new game)</span>
                <div class="settings-item">
                    <input type="checkbox" name="bombs-on-layer-chbx" id="bombs-on-layer-chbx" checked onchange="updateSetting(this.checked, 'difficulty', 'showLayerBombAmount')" />
                    <label for="bombs-on-layer-chbx">Show layer bomb amount</label>
                </div>
            </fieldset>
    
            <fieldset>
                <legend>Size</legend>
                <button class="settings-reset-btn" onclick="resetSetting('size')"><i>Reset</i></button>
                <div class="settings-item">
                    <label for="board-width-inp">Width:</label>
                    <input type="number" name="board-width-inp" id="board-width-inp" value="5" onchange="updateSetting(this.value, 'size', 'width')" />
                </div>
                <div class="settings-item">
                    <label for="board-height-inp">Height:</label>
                    <input type="text" name="board-height-inp" id="board-height-inp" value="Same as width" disabled onchange="updateSetting(this.value, 'size', 'height')" />
                </div>
                <div class="settings-item">
                    <label for="board-layers-inp">Layers:</label>
                    <input type="number" name="board-layers-inp" id="board-layers-inp" value="3" onchange="updateSetting(this.value, 'size', 'layers')" />
                </div>
                <span class="tip-note">(Size update at the start of a new game)</span>
            </fieldset>
    
            <fieldset>
                <legend>Colors</legend>
                <button class="settings-reset-btn" onclick="resetSetting('colors')"><i>Reset</i></button>
                <div class="settings-color-cont">
                    <div class="settings-color-item">
                        <div class="sub-color-inp">
                            <div><input for-css="--grass-flag-color" type="color" name="flag-color-grass-inp" id="flag-color-grass-inp" onchange="updateSetting(this.value, 'colors', 'grassFlag')" /></div>
                        </div>

                        <div class="color-inp">
                            <label for="color-grass-inp" style="--settings-item-label-color: var(--grass-text-color);">Grass</label>
                            <div><input for-css="--board-grass-color" type="color" name="color-grass-inp" id="color-grass-inp" onchange="updateSetting(this.value, 'colors', 'grass')" /></div>
                            <label for="flag-color-grass-inp" class="color-flag-preview flag" style="--preview-color: var(--grass-flag-color);"></label>
                            <div class="color-tileing-preview" style="--preview-color: var(--board-grass-tiling-color); --preview-opacity: var(--board-grass-tiling-contrast);"></div>
                        </div>

                        <div class="sub-color-inp">
                            <!-- <label for="sub-color-grass-inp">Text</label> -->
                            <div><input for-css="--grass-text-color" type="color" name="sub-color-grass-inp" id="sub-color-grass-inp" onchange="updateSetting(this.value, 'colors', 'grassText')" /></div>
                        </div>

                        <div class="sub-color-inp">
                            <div id="tileing-color-grass-inp-cont"><input for-css="--board-grass-tiling-color" type="color" name="tileing-color-grass-inp" id="tileing-color-grass-inp" onchange="updateSetting(this.value, 'colors', 'grassTileing')" /></div>
                            <input for-css="--board-grass-tiling-contrast" type="number" min="0" max="100" name="tileing-opacity-grass-inp" id="tileing-opacity-grass-inp" onchange="updateSetting(this.value, 'colors', 'grassTileingOpacity')">
                        </div>
                    </div>

                    <div class="settings-color-item">
                        <div class="sub-color-inp">
                            <div><input for-css="--ground-flag-color" type="color" name="flag-color-ground-inp" id="flag-color-ground-inp" onchange="updateSetting(this.value, 'colors', 'groundFlag')" /></div>
                        </div>

                        <div class="color-inp">
                            <label for="color-ground-inp" style="--settings-item-label-color: var(--ground-text-color);">Ground</label>
                            <div><input for-css="--board-ground-color" type="color" name="color-ground-inp" id="color-ground-inp" onchange="updateSetting(this.value, 'colors', 'ground')" /></div>
                            <label for="flag-color-ground-inp" class="color-flag-preview mine" style="--preview-color: var(--ground-flag-color);"></label>
                            <div class="color-tileing-preview" style="--preview-color: var(--board-ground-tiling-color); --preview-opacity: var(--board-ground-tiling-contrast);"></div>
                        </div>

                        <div class="sub-color-inp">
                            <div><input for-css="--ground-text-color" type="color" name="sub-color-ground-inp" id="sub-color-ground-inp" onchange="updateSetting(this.value, 'colors', 'groundText')" /></div>
                        </div>

                        <div class="sub-color-inp">
                            <div id="tileing-color-ground-inp-cont"><input for-css="--board-ground-tiling-color" type="color" name="tileing-color-ground-inp" id="tileing-color-ground-inp" onchange="updateSetting(this.value, 'colors', 'groundTileing')" /></div>
                            <input for-css="--board-ground-tiling-contrast" type="number" min="0" max="100" name="tileing-opacity-ground-inp" id="tileing-opacity-ground-inp" onchange="updateSetting(this.value, 'colors', 'groundTileingOpacity')">
                        </div>
                    </div>
                </div>
            </fieldset>
    
            <fieldset>
                <legend>Other</legend>
                <button class="setting-opt-btn" onclick="restartGame()">Start new game</button>
                <button class="setting-opt-btn" id="refresh-btn">Refresh app</button>
                <span id="pwa-status">Status</span>
                <span id="game-js-version">Game: </span>
                <span id="app-js-version">App: </span>
            </fieldset>
        </div>

        <div class="spacer" style="--height: 1rem;"></div>
        <button class="setting-opt-btn" onclick="closeSettings()" autofocus>Close</button>
    </dialog>

    <dialog id="game-end-dialog">
        <center>
            <h1 id="game-end-status">You xx</h1>
        </center>
        <button class="" onclick="openSettings()">Open settings</button>
        <div class="spacer" style="--height: 1rem;"></div>
        <button class="" onclick="restartGame()" autofocus>New game</button>
    </dialog>

    <header>
        <div class="flex" style="--direction: row; --gap: 1rem;">
            <h2 id="lives" class="default-box digital">3/3</h2>
            <h2 id="mines-left" class="default-box digital">78 (11)</h2> <!-- [total mines] ([mines on this level]) -->
        </div>

        <div class="flex" style="--direction: row; --gap: 1rem;">
            <button id="install-button" class="hidden default-box" aria-label="Install PWA">
                <img src="/icons/download.svg" alt="Download" width="20" height="20" />
            </button>
            <button onclick="openSettings()" id="settings-btn" aria-label="Settings">
                <img src="/icons/settings.svg" alt="Settings" width="36" height="36" />
            </button>
        </div>
    </header>

    <main class="board default-box" style="--padding: 0; --column-count: 11;">
        <div class="board-inner">
            <!-- The game board will be generated here by JavaScript -->
        </div>
    </main>

    <footer>
        <div class="spacer"></div>

        <div class="flex" style="--direction: row; --gap: 1rem;">
            <div class="default-box flag-toggle" style="--padding: 0;">
                <input type="radio" name="flag-toggle" id="flag-toggle-mine" checked>
                <label for="flag-toggle-mine">
                    <img src="/icons/mine.svg" alt="Mine first" width="36" height="36" />
                </label>
                <input type="radio" name="flag-toggle" id="flag-toggle-flag">
                <label for="flag-toggle-flag">
                    <img src="/icons/flag.svg" alt="Flag first" width="36" height="36" />
                </label>
            </div>

            <div class="default-box layer-swap" style="--padding: 0;">
                <button id="go-up-btn" class="layer-button" onclick="goUp()">^</button>
                <button id="go-down-btn" class="layer-button" onclick="goDown()">v</button>
            </div>
            
            <h2 id="current-layer" class="default-box digital" style="--digital-color: lightgray;">2/5</h2> <!-- [current layer] / [total layers] -->
        </div>
    </footer>

    <script src="/app.js?n=App&v=0.4"></script>
    <script src="/game.js?n=Game&v=0.11"></script>
</body>
</html>
