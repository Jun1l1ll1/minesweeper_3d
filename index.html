<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2c3e50" />
    <title>Minesweeper 3D</title>
    <!-- Manifest defines how the app appears when installed on a device -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css?v=0.3" />
</head>
<body>
    <dialog id="settings-dialog">

        <div class="settings-container">
            <fieldset>
                <legend>Difficulty</legend>
                <div class="settings-item">
                    <span>Bomb amount:</span>
                    <input type="number" name="bomb-amount-inp" id="bomb-amount-inp" value="5" />
                </div>
                <div class="settings-item">
                    <span>Lives:</span>
                    <input type="number" name="lives-inp" id="lives-inp" value="3" />
                </div>
                <div class="settings-item">
                    <input type="checkbox" name="bombs-on-layer-chbx" id="bombs-on-layer-chbx" checked />
                    <label for="bombs-on-layer-chbx">Show layer bomb amount</label>
                </div>
            </fieldset>
    
            <fieldset>
                <legend>Size</legend>
                <div class="settings-item">
                    <span>Width:</span>
                    <input type="number" name="board-width-inp" id="board-width-inp" value="5" />
                </div>
                <div class="settings-item">
                    <span>Height:</span>
                    <input type="text" name="board-height-inp" id="board-height-inp" value="Same as width" disabled />
                </div>
                <div class="settings-item">
                    <span>Layers:</span>
                    <input type="number" name="board-layers-inp" id="board-layers-inp" value="3" />
                </div>
            </fieldset>
    
            <fieldset>
                <legend>Colors</legend>
                <!-- TODO -->
            </fieldset>
    
            <fieldset>
                <legend>Other</legend>
                <button class="default-box">Start new game</button>
            </fieldset>
        </div>

        <div class="spacer" style="--height: 1rem;"></div>
        <button class="default-box" commandfor="settings-dialog" command="close">Close</button>
    </dialog>

    <header>
        <div class="flex" style="--direction: row; --gap: 1rem;">
            <h2 id="clock" class="default-box digital">00:00:00</h2>
            <h2 id="mines-left" class="default-box digital">78 (11)</h2> <!-- [total mines] ([mines on this level]) -->
        </div>

        <div class="flex" style="--direction: row; --gap: 1rem;">
            <button id="install-button" class="hidden default-box" aria-label="Install PWA">
                <img src="/icons/download.svg" alt="Download" width="20" height="20" />
            </button>
            <button commandfor="settings-dialog" command="show-modal" id="settings-btn" aria-label="Settings">
                <img src="/icons/settings.svg" alt="Settings" width="36" height="36" />
            </button>
        </div>
    </header>

    <main class="board default-box" style="--padding: 0; --column-count: 11;">
        <div class="board-inner">
            <!-- The game board will be generated here by JavaScript -->
        </div>
    </main>

    <footer>
        <div class="spacer"></div>

        <div class="flex" style="--direction: row; --gap: 1rem;">
            <div class="default-box flag-toggle" style="--padding: 0;">
                <input type="radio" name="flag-toggle" id="flag-toggle-mine" checked>
                <label for="flag-toggle-mine">
                    <img src="/icons/mine.svg" alt="Mine first" width="36" height="36" />
                </label>
                <input type="radio" name="flag-toggle" id="flag-toggle-flag">
                <label for="flag-toggle-flag">
                    <img src="/icons/flag.svg" alt="Flag first" width="36" height="36" />
                </label>
            </div>

            <div class="default-box layer-swap" style="--padding: 0;">
                <button id="go-up-btn" class="layer-button" onclick="goUp()">^</button>
                <button id="go-down-btn" class="layer-button" onclick="goDown()">v</button>
            </div>
            
            <h2 id="current-layer" class="default-box digital" style="--digital-color: lightgray;">2/5</h2> <!-- [current layer] / [total layers] -->
        </div>
    </footer>

    <script src="/app.js?v=0.2"></script>
    <script src="/game.js?v=0.3"></script>
</body>
</html>
